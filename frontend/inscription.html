<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RunTrack est une plateforme d'entraînement en course à pied qui vous aide à suivre vos performances, planifier vos séances et atteindre vos objectifs de course.">
    <meta name="author" content="Lucas Baretzki">
    <meta name="keywords" content="RunTrack, course à pied, entraînement, suivi des performances, planification des séances, objectifs de course">
    <title>RunTrack — Inscription</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li> <!-- Une fois connecté, affiché dashboard.html au lieu de index.html -->
                <li><a href="inscription.html">Inscription</a></li>
                <li><a href="connexion.html">Connexion</a></li>
            </ul>
        </nav>
    </header>
    <main class="inscription">
        <h1>Inscription</h1>
        <p>
            Pour accéder à toutes les fonctionnalités de RunTrack, veuillez vous inscrire.
        </p>
        <div id="form-error"></div>
        <form action="" method="POST"> <!-- Action à remplacer par inscription_traitement.php -->
            <label for="username">Nom d'utilisateur :*</label>
            <input class="input-field" type="text" id="username" name="username" required>

            <label for="nom">Nom :*</label>
            <input class="input-field" type="text" id="nom" name="nom" required>

            <label for="prenom">Prénom :*</label>
            <input class="input-field" type="text" id="prenom" name="prenom" required>

            <label for="sexe">Sexe :*</label>
            <select class="input-field" id="sexe" name="sexe" required>
                <option value="">Sélectionnez votre sexe</option>
                <option value="homme">Homme</option>
                <option value="femme">Femme</option>
                <option value="autre">Autre</option>
            </select>
 
            <label for="age">Âge :*</label>
            <input class="input-field" type="number" id="age" name="age" required>

            <label for="email">Adresse e-mail :*</label>
            <input class="input-field" type="email" id="email" name="email" placeholder="exemple@domaine.com" required>

            <label for="password">Mot de passe :*</label>
            <input class="input-field" type="password" id="password" name="password" required>

            <label for="confirm_password">Confirmer le mot de passe :*</label>
            <input class="input-field" type="password" id="confirm_password" name="confirm_password" required>

            <input class="btn" type="submit" value="S'inscrire">
            <input class="btn" type="reset" value="Réinitialiser">
            
            <p>
                * Champs obligatoires
            </p>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 RunTrack. Tous droits réservés.</p>
    </footer>
    <script src="js/inscription.js"></script>
</body>
</html>
