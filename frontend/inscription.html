    <link rel="icon" href="img/favicon.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li> <!-- Une fois connecté, affiché dashboard.html au lieu de index.html -->
                <li><a href="inscription.html">Inscription</a></li>
                <li><a href="connexion.html">Connexion</a></li>
            </ul>
        </nav>
    </header>
    <main class="inscription">
        <h1>Inscription</h1>
        <p>
            Pour accéder à toutes les fonctionnalités de RunTrack, veuillez vous inscrire.
        </p>
        <form action="inscription_traitement.php" method="POST">
            <label for="username">Nom d'utilisateur :</label>
            <input class="input-field" type="text" id="username" name="username" required>

            <label for="email">Adresse e-mail :</label>
            <input class="input-field" type="email" id="email" name="email" placeholder="exemple@domaine.com" required>

            <label for="password">Mot de passe :</label>
            <input class="input-field" type="password" id="password" name="password" required>

            <input class="btn" type="submit" value="S'inscrire">
            <input class="btn" type="reset" value="Réinitialiser">
        </form>
    </main>
    <footer>
        <p>&copy; 2026 RunTrack. Tous droits réservés.</p>
    </footer>
</body>
